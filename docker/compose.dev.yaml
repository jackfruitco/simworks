services:
  server:
    profiles: ["core"]
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
      target: runtime
    user: appuser
    env_file:
      - .env
    environment:
      DJANGO_MIGRATE: ${DJANGO_MIGRATE:-1}
      DJANGO_CREATE_DEFAULT_ROLES: ${DJANGO_CREATE_DEFAULT_ROLES:-1}
      DJANGO_COLLECTSTATIC: ${DJANGO_COLLECTSTATIC:-1}
    expose:
      - 8000
    volumes:
      - ../SimWorks:/app/SimWorks
      - static-vol:/app/static
      - media-vol:/app/media
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - MedSimNet
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      tailwind-watch:
        condition: service_started

  tailwind-watch:
    profiles: ["core"]
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
      target: runtime
    entrypoint: []
    user: appuser
    env_file:
      - .env
    environment:
      CHOKIDAR_USEPOLLING: "1"
      CHOKIDAR_INTERVAL: "300"
      DJANGO_MIGRATE: ${DJANGO_MIGRATE:-0}
      DJANGO_CREATE_DEFAULT_ROLES: ${DJANGO_CREATE_DEFAULT_ROLES:-0}
      DJANGO_COLLECTSTATIC: ${DJANGO_COLLECTSTATIC:-0}
    command: ["npm", "run", "watch:css:docker"]
    volumes:
      - ../SimWorks:/app/SimWorks
      - static-vol:/app/static
    restart: unless-stopped
    networks:
      - MedSimNet

  db:
    profiles: ["core"]
    image: postgres:${DB_IMAGE_TAG:-18.2-alpine}
    restart: always
    user: postgres
    volumes:
      - db-data:/var/lib/postgresql
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-AppDatabase}
      POSTGRES_USER: ${POSTGRES_USER:-appuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?password not set!}
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
    networks:
      - MedSimNet
    hostname: 'db'
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-appuser} -d ${DB_NAME:-AppDatabase} -h 127.0.0.1 -p 5432" ]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    profiles: ["core"]
    image: nginx:${PROXY_IMAGE_TAG:-latest}
    ports:
      - "80:80"
    env_file:
      - .env
    volumes:
      - ../nginx/default.dev.conf:/etc/nginx/conf.d/default.conf:ro
      - static-vol:/app/static
      - media-vol:/app/media
    depends_on:
      server:
        condition: service_healthy
    networks:
      - MedSimNet

  redis:
    profiles: ["core"]
    image: redis:${REDIS_IMAGE_TAG:-7.4.2-alpine}
    command: ["sh", "-c", "redis-server --requirepass \"$REDIS_PASSWORD\""]
    environment:
      - REDIS_PASSWORD
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      MedSimNet:
        aliases:
          - "${REDIS_HOSTNAME:-redis}"

  celery:
    profiles: ["workers"]
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
      target: runtime
    env_file:
      - .env
    environment:
      DJANGO_MIGRATE: 0
      DJANGO_CREATE_DEFAULT_ROLES: 0
      DJANGO_COLLECTSTATIC: 0
    user: appuser
    command: ["sh", "-c", "PYTHONPATH=/app/SimWorks celery -A config worker --pool=threads --loglevel=info"]
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    volumes:
      - static-vol:/app/static
      - media-vol:/app/media
    restart: unless-stopped
    networks:
      - MedSimNet
    hostname: 'celery-worker'
    healthcheck:
      test: [ "CMD", "celery", "-A", "config", "status" ]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  celerybeat:
    profiles: ["beat"]
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
      target: runtime
    user: appuser
    env_file:
      - .env
    environment:
      DJANGO_MIGRATE: 0
      DJANGO_CREATE_DEFAULT_ROLES: 0
      DJANGO_COLLECTSTATIC: 0
    command: ["sh", "-c", "PYTHONPATH=/app/SimWorks celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler"]
    volumes:
      - static-vol:/app/static
      - media-vol:/app/media
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
      server:
        condition: service_started
    networks:
      - MedSimNet
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "celery", "-A", "config", "status" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  db-data:
  static-vol:
  media-vol:
networks:
  MedSimNet:
    driver: bridge
