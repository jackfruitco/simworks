services:
  medsim-dev-server:
    profiles: ["core"]
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
      target: web
    user: "0:0"
    env_file:
      - .env
    # environment:
    #   DJANGO_COLLECTSTATIC: "0"
    expose:
      - 8000
    hostname: 'server'
    volumes:
      # - ..:/app
      - medsim-dev-static-vol:/app/static
      - medsim-dev-media-vol:/app/media
    command: [ "bash", "/app/docker/entrypoint.dev.sh" ]
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - MedSimNet-dev
    depends_on:
      medsim-dev-db:
        condition: service_healthy

  medsim-dev-db:
    profiles: ["core"]
    image: postgres:${DB_IMAGE_TAG:-17.2-alpine}
    restart: always
    user: postgres
    volumes:
      - medsim-dev-db-data:/var/lib/postgresql/data
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME:-AppDatabase}
      POSTGRES_USER: ${DB_USER:-appuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?password not set!}
      POSTGRES_HOST: ${DB_HOST:-db}
      POSTGRES_PORT: ${DB_PORT:-5432}
    networks:
      - MedSimNet-dev
    expose:
      - '${DB_PORT:-5432}'
    hostname: 'db'
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-appuser} -d ${DB_NAME:-AppDatabase} -h 127.0.0.1 -p ${DB_PORT:-5432}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  medsim-dev-nginx:
    profiles: ["core"]
    image: nginx:${PROXY_IMAGE_TAG:-latest}
    # user: "${DOCKER_UID:-10001}:${DOCKER_GID:-10001}"
    ports:
      - "80:80"
    env_file:
      - .env
    volumes:
      - ../nginx/nginx.template.conf:/etc/nginx/nginx.template.conf:ro
      - ../nginx/default.dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ../nginx/nginx-entrypoint.sh:/docker-entrypoint.d/nginx-entrypoint.sh:ro
      - medsim-dev-static-vol:/app/static
      - medsim-dev-media-vol:/app/media
    depends_on:
      - medsim-dev-server
    networks:
      - MedSimNet-dev
    entrypoint: ["/bin/sh", "/docker-entrypoint.d/nginx-entrypoint.sh"]

  medsim-dev-redis:
    profiles: ["core"]
    image: redis:${REDIS_IMAGE_TAG:-7.4.2-alpine}
    command: redis-server --requirepass ${REDIS_PASSWORD:?password not set!}
    entrypoint: []
    container_name: ${REDIS_HOSTNAME:-redis}
    hostname: ${REDIS_HOSTNAME:-redis}
    networks:
      - MedSimNet-dev
    expose:
      - '${REDIS_PORT:-6379}'

  medsim-dev-celery:
    profiles: ["workers"]
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
      target: celery
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app/SimWorks
    # user: appuser
    user: root
    # command: [ "celery", "-A", "config", "worker", "--loglevel=info" ]
    depends_on:
      medsim-dev-redis:
        condition: service_started
      medsim-dev-db:
        condition: service_healthy
      medsim-dev-server:
        condition: service_started
    volumes:
      - medsim-dev-static-vol:/app/static
      - medsim-dev-media-vol:/app/media
    restart: unless-stopped
    networks:
      - MedSimNet-dev
    hostname: 'medsim-dev-celery-worker'
    healthcheck:
      test: [ "CMD", "celery", "-A", "config", "status" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  medsim-dev-celerybeat:
    profiles: ["beat"]
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
      target: beat
    user: appuser
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app/SimWorks
    # command: [ "celery", "-A", "config", "beat", "--loglevel=info", "--scheduler", "django_celery_beat.schedulers:DatabaseScheduler" ]
    volumes:
      - medsim-dev-static-vol:/app/static
      - medsim-dev-media-vol:/app/media
    depends_on:
      medsim-dev-redis:
        condition: service_started
      medsim-dev-db:
        condition: service_healthy
      medsim-dev-server:
        condition: service_started
    networks:
      - MedSimNet-dev
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "celery", "-A", "config", "status" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  medsim-dev-db-data:
  medsim-dev-static-vol:
  medsim-dev-media-vol:
networks:
  MedSimNet-dev:
    driver: bridge
