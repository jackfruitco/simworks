x-app-env: &app_env
  SITE_NAME: ${SITE_NAME}
  SITE_ADMIN_EMAIL: ${SITE_ADMIN_EMAIL}

  DJANGO_DEBUG: ${DJANGO_DEBUG:-"False"}
  DJANGO_LOG_LEVEL: ${DJANGO_LOG_LEVEL:-"INFO"}
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
  DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
  CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS}
  CSRF_COOKIE_SECURE: ${CSRF_COOKIE_SECURE}
  SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE}

  POSTGRES_DB: ${POSTGRES_DB}
  POSTGRES_USER: ${POSTGRES_USER}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  POSTGRES_HOST: ${POSTGRES_HOST:-db}

  REDIS_HOSTNAME: ${REDIS_HOSTNAME:-redis}
  REDIS_PASSWORD: ${REDIS_PASSWORD}

  ORCA_OPENAI_API_KEY: ${ORCA_OPENAI_API_KEY}
  ORCA_DEFAULT_MODEL: ${ORCA_DEFAULT_MODEL}
  ORCA_IDENTITY_STRIP_TOKENS: ${ORCA_IDENTITY_STRIP_TOKENS}
  ORCA_MAX_ATTEMPTS: ${ORCA_MAX_ATTEMPTS}

  LOGFIRE_API_KEY: ${LOGFIRE_API_KEY}

  JWT_SECRET_KEY: ${JWT_SECRET_KEY}

services:
  server:
    image: ghcr.io/jackfruitco/simworks:${SERVER_IMAGE_TAG:-latest}
    environment:
      <<: *app_env
      DJANGO_MIGRATE: ${DJANGO_MIGRATE:-0}
      DJANGO_CREATE_DEFAULT_ROLES: ${DJANGO_CREATE_DEFAULT_ROLES:-0}
      DJANGO_COLLECTSTATIC: ${DJANGO_COLLECTSTATIC:-0}
    expose:
      - 8000
    volumes:
      - static-vol:/app/static
      - media-vol:/app/media
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: postgres:${DB_IMAGE_TAG:-18.2-alpine}
    restart: always
    user: postgres
    volumes:
      - db-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB
      - POSTGRES_USER
      - POSTGRES_PASSWORD
    networks:
      - app
    hostname: 'db'
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-appuser} -d ${POSTGRES_DB:-AppDatabase} -h 127.0.0.1 -p 5432" ]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:${PROXY_IMAGE_TAG:-latest}
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
    volumes:
      - ${NGINX_CONF_DIR:-/opt/SimWorks/nginx}/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static-vol:/app/static
      - media-vol:/app/media
    depends_on:
      - server
    networks:
      - app
      - _TunnelNet

  nginx-dev:
    extends:
      service: nginx
    profiles: ["dev"]
    ports:
      - "${NGINX_HTTP_PORT:-8080}:80"

  redis:
    image: redis:${REDIS_IMAGE_TAG:-7.4.2-alpine}
    restart: unless-stopped
    command: ["sh", "-c", "redis-server --requirepass \"$REDIS_PASSWORD\""]
    environment:
      - REDIS_PASSWORD
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      app:
        aliases:
          - "${REDIS_HOSTNAME:-redis}"

  celery:
    image: ghcr.io/jackfruitco/simworks:${SERVER_IMAGE_TAG:-latest}
    environment:
      <<: *app_env
      DJANGO_MIGRATE: 0
      DJANGO_CREATE_DEFAULT_ROLES: 0
      DJANGO_COLLECTSTATIC: 0
    user: appuser
    command: ["sh", "-c", "PYTHONPATH=/app/SimWorks celery -A config worker --pool=threads --loglevel=info"]
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    volumes:
      - static-vol:/app/static
      - media-vol:/app/media
    restart: unless-stopped
    networks:
      - app
    hostname: 'celery-worker'
    healthcheck:
      test: [ "CMD", "celery", "-A", "config", "status" ]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  celerybeat:
    image: ghcr.io/jackfruitco/simworks:${SERVER_IMAGE_TAG:-latest}
    environment:
      <<: *app_env
      DJANGO_MIGRATE: 0
      DJANGO_CREATE_DEFAULT_ROLES: 0
      DJANGO_COLLECTSTATIC: 0
    command: ["sh", "-c", "PYTHONPATH=/app/SimWorks celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler"]
    user: appuser
    volumes:
      - static-vol:/app/static
      - media-vol:/app/media
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - app
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "celery", "-A", "config", "status" ]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  db-data:
  static-vol:
  media-vol:
networks:
  app:
    driver: bridge
    # internal: true
  _TunnelNet:
    external: True