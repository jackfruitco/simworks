services:
  server:
    image: ghcr.io/jackfruitco/simworks:${SERVER_IMAGE_TAG:-latest}
    environment:
      DJANGO_MIGRATE: ${DJANGO_MIGRATE:-1}
      DJANGO_CREATE_DEFAULT_ROLES: ${DJANGO_CREATE_DEFAULT_ROLES:-1}
      DJANGO_COLLECTSTATIC: ${DJANGO_COLLECTSTATIC:-1}
    expose:
      - 8000
    volumes:
      - static-vol:/app/static
      - media-vol:/app/media
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: postgres:${DB_IMAGE_TAG:-18.2-alpine}
    restart: always
    user: postgres
    volumes:
      - db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME:-AppDatabase}
      POSTGRES_USER: ${DB_USER:-appuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?password not set!}
      POSTGRES_HOST: ${DB_HOST:-db}
      POSTGRES_PORT: ${DB_PORT:-5432}
    networks:
      - internal
    expose:
      - '${DB_PORT:-5432}'
    hostname: 'db'
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-appuser} -d ${DB_NAME:-AppDatabase} -h 127.0.0.1 -p ${DB_PORT:-5432}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:${PROXY_IMAGE_TAG:-latest}
    volumes:
      - ${NGINX_CONF_DIR:-/opt/SimWorks/nginx}/nginx.template.conf:/etc/nginx/nginx.template.conf:ro
      - ${NGINX_CONF_DIR:-/opt/SimWorks/nginx}/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ${NGINX_CONF_DIR:-/opt/SimWorks/nginx}/nginx-entrypoint.sh:/docker-entrypoint.d/nginx-entrypoint.sh:ro
      - static-vol:/app/static
      - media-vol:/app/media
    depends_on:
      - server
    networks:
      - internal
      - tunnel
    entrypoint: ["/bin/sh", "/docker-entrypoint.d/nginx-entrypoint.sh"]

  nginx-dev:
    extends:
      service: nginx
    profiles: ["dev"]
    ports:
      - "${NGINX_HTTP_PORT:-8080}:80"

  redis:
    image: redis:${REDIS_IMAGE_TAG:-7.4.2-alpine}
    command: redis-server --requirepass ${REDIS_PASSWORD:?password not set!}
    networks:
      internal:
        aliases:
          - ${REDIS_HOSTNAME:-redis}

  celery:
    image: ghcr.io/jackfruitco/simworks:${SERVER_IMAGE_TAG:-latest}
    environment:
      PYTHONPATH: /app/SimWorks
      DJANGO_MIGRATE: "0"
      DJANGO_CREATE_DEFAULT_ROLES: "0"
      DJANGO_COLLECTSTATIC: "0"
    user: appuser
    command: ["celery", "-A", "config", "worker", "--pool=threads", "--loglevel=info"]
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
    volumes:
      - static-vol:/app/static
      - media-vol:/app/media
    restart: unless-stopped
    networks:
      - internal
    hostname: 'celery-worker'
    healthcheck:
      test: [ "CMD", "celery", "-A", "config", "status" ]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  celerybeat:
    image: ghcr.io/jackfruitco/simworks:${SERVER_IMAGE_TAG:-latest}
    environment:
      PYTHONPATH: /app/SimWorks
      DJANGO_MIGRATE: "0"
      DJANGO_CREATE_DEFAULT_ROLES: "0"
      DJANGO_COLLECTSTATIC: "0"
    command: ["celery", "-A", "config", "beat", "--loglevel=info", "--scheduler", "django_celery_beat.schedulers:DatabaseScheduler"]
    user: appuser
    volumes:
      - static-vol:/app/static
      - media-vol:/app/media
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "celery", "-A", "config", "status" ]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  db-data:
  static-vol:
  media-vol:
networks:
  internal:
    driver: bridge
    internal: true
  tunnel:
    external: True