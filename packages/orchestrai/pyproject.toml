[project]
name = "orchestrai"
version = "0.5.0"
description = "Provider-agnostic AI engine (pure Python)."
readme = "README.md"
requires-python = ">=3.14"
license = { text = "MIT" }
authors = [
  { name = "Jackfruit Co" },
  { name = "Tyler J", email = "tyler@jackfruit.me" }
]
classifiers = [
  "Programming Language :: Python :: 3.14",
  "License :: OSI Approved :: MIT License",
]

dependencies = [
  "pydantic>=2.12.5",
  "pydantic-ai>=0.1.0",
  "typing-extensions>=4.12",
  "opentelemetry-api>=1.31",
]

[project.optional-dependencies]
dev = ["pytest>=9", "ruff>=0.6", "mypy>=1.11"]

[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/orchestrai"]

[tool.hatch.build.targets.sdist]
include = [
    "src/orchestrai/**",
    "tests/**",
    "pyproject.toml",
    "README.md",
    "LICENSE*",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
pythonpath = ["src"]
testpaths = ["tests"]
addopts = "-ra --maxfail=1 --strict-markers"
markers = [
  "unit: fast isolated tests with no DB/network requirements",
  "component: boundary-level tests with fakes/stubs",
  "integration: Django/ORM/request-cycle and cross-module integration tests",
  "contract: package public API/schema compatibility tests",
  "system: high-level system smoke tests",
  "e2e: end-to-end tests across full stack boundaries",
  "slow: intentionally slow tests excluded from fast lanes",
]
