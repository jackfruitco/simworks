{% extends "base.html" %}
{% block content %}
<section class="mx-auto max-w-xl p-6">
  <h1 class="text-2xl font-semibold">Delete account</h1>
  <p class="mt-2">Type DELETE to permanently remove your MedSim account and data.</p>
  <form method="post" class="mt-4">
    {% csrf_token %}
    <input class="border p-2" name="confirmation" placeholder="DELETE" />
    <button class="ml-2 rounded bg-red-600 px-3 py-2 text-white" type="submit">Delete</button>
  </form>
</section>
{% endblock %}
