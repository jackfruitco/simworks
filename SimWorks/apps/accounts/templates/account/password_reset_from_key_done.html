{% extends "base.html" %}

{% block title %}Password Changed - {{ SITE_NAME }}{% endblock %}

{% block content %}
    <div class="max-w-md mx-auto mt-8 bg-surface-alt border border-border rounded-lg shadow-lg p-8">
        <div class="text-center mb-6">
            <svg class="w-16 h-16 mx-auto text-green-500 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <h1 class="text-3xl font-bold text-content mb-4">Password Changed!</h1>
        </div>

        <div class="bg-green-50 border border-green-200 text-green-800 px-4 py-3 rounded mb-6">
            <p>Your password has been successfully changed.</p>
        </div>

        <p class="text-content-secondary mb-6 text-center">
            You can now use your new password to login to your account.
        </p>

        <div class="text-center">
            <a href="{% url 'account_login' %}"
               class="inline-block bg-jckfrt-olive hover:bg-jckfrt-olive-hover text-content-light font-medium py-2 px-6 rounded transition-colors">
                Login Now
            </a>
        </div>
    </div>
{% endblock %}
