<div id="invite-success-content" class="tw-root mx-auto w-full max-w-2xl px-4 py-6 sm:px-6 lg:px-8">
  <section class="rounded-2xl border border-border bg-surface-alt p-4 shadow-xl sm:p-6">
    <h1 class="text-2xl font-bold text-content sm:text-3xl">Invitation Created</h1>
    <p class="mt-2 text-sm text-content-secondary">Share this invite link with the recipient.</p>

    <div class="mt-6">
      {% include "accounts/partials/invite_single.html" with invite=invite only %}
    </div>

    <div class="mt-6">
      <a href="{% url 'accounts:list-invites' %}"
         class="inline-flex min-h-11 items-center rounded-lg border border-border bg-surface px-4 py-2 text-sm font-semibold text-content transition-colors hover:bg-surface-alt"
         hx-get="{% url 'accounts:list-invites' %}"
         hx-target="#invite-content"
         hx-swap="innerHTML transition:true">
        Return to All Invitations
      </a>
    </div>
  </section>
</div>
