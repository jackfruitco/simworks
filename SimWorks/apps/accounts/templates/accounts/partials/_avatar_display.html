<div id="avatar-display" class="relative h-28 w-28 overflow-hidden rounded-full border-4 border-border shadow-md sm:h-36 sm:w-36">
    {% if profile_user.avatar %}
        <img src="{{ profile_user.avatar_medium.url }}"
             alt="{{ profile_user.first_name }} {{ profile_user.last_name }}"
             class="h-full w-full object-cover">
    {% else %}
        <div class="flex h-full w-full items-center justify-center bg-gradient-to-br from-jckfrt-olive to-jckfrt-yellow">
            <span class="text-2xl font-bold tracking-wide text-white sm:text-4xl">
                {{ profile_user.first_name|slice:":1"|upper }}{{ profile_user.last_name|slice:":1"|upper }}
            </span>
        </div>
    {% endif %}
</div>
