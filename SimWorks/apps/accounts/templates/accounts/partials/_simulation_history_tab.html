{% load static %}

<div class="simulation-history-section" x-data="simulationHistoryData()">
    <!-- Filters and Sorting -->
    <div class="history-controls">
        <!-- Search/Filter Bar -->
        <div class="filter-bar">
            <div class="filter-group">
                <label class="filter-label">Status</label>
                <select x-model="filters.status"
                        @change="applyFilters()"
                        class="filter-select">
                    <option value="">All</option>
                    <option value="complete">Complete</option>
                    <option value="in_progress">In Progress</option>
                </select>
            </div>

            <div class="filter-group">
                <label class="filter-label">Sort By</label>
                <select x-model="filters.sort"
                        @change="applyFilters()"
                        class="filter-select">
                    <option value="-start_timestamp">Newest First</option>
                    <option value="start_timestamp">Oldest First</option>
                    <option value="diagnosis">Diagnosis (A-Z)</option>
                    <option value="-diagnosis">Diagnosis (Z-A)</option>
                </select>
            </div>

            <div class="filter-group">
                <label class="filter-label">Date Range</label>
                <div class="date-range-inputs">
                    <input type="date"
                           x-model="filters.date_from"
                           @change="applyFilters()"
                           class="filter-input"
                           placeholder="From">
                    <span class="mx-2">to</span>
                    <input type="date"
                           x-model="filters.date_to"
                           @change="applyFilters()"
                           class="filter-input"
                           placeholder="To">
                </div>
            </div>

            <button @click="clearFilters()"
                    class="btn-clear-filters"
                    x-show="hasActiveFilters()">
                <span class="iconify" data-icon="mdi:filter-remove"></span>
                Clear Filters
            </button>
        </div>
    </div>

    <!-- Simulation List -->
    <div class="simulation-list-container">
        <div id="simulation-list"
             class="simulation-list"
             hx-get="{% url 'accounts:simulation-history' %}"
             hx-trigger="load"
             hx-swap="innerHTML"
             @scroll="handleScroll($event)">
            <div class="loading-spinner">
                <span class="iconify spin" data-icon="mdi:loading"></span>
                Loading simulations...
            </div>
        </div>
    </div>
</div>
