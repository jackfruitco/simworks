<div class="space-y-4" x-data="simulationHistoryData()">
    <section class="rounded-xl border border-border bg-surface p-4 shadow-sm sm:p-6">
        <div class="grid gap-4 md:grid-cols-2 xl:grid-cols-4">
            <div class="space-y-2">
                <label class="block text-xs font-semibold uppercase tracking-wide text-content-secondary">Status</label>
                <select x-model="filters.status"
                        @change="applyFilters()"
                        class="min-h-11 w-full rounded-lg border border-border bg-surface-alt px-3 py-2 text-sm text-content focus:outline-none focus:ring-2 focus:ring-jckfrt-olive">
                    <option value="">All</option>
                    <option value="complete">Complete</option>
                    <option value="in_progress">In Progress</option>
                </select>
            </div>

            <div class="space-y-2">
                <label class="block text-xs font-semibold uppercase tracking-wide text-content-secondary">Sort By</label>
                <select x-model="filters.sort"
                        @change="applyFilters()"
                        class="min-h-11 w-full rounded-lg border border-border bg-surface-alt px-3 py-2 text-sm text-content focus:outline-none focus:ring-2 focus:ring-jckfrt-olive">
                    <option value="-start_timestamp">Newest First</option>
                    <option value="start_timestamp">Oldest First</option>
                    <option value="diagnosis">Diagnosis (A-Z)</option>
                    <option value="-diagnosis">Diagnosis (Z-A)</option>
                </select>
            </div>

            <div class="space-y-2 md:col-span-2 xl:col-span-1">
                <label class="block text-xs font-semibold uppercase tracking-wide text-content-secondary">Date Range</label>
                <div class="grid grid-cols-1 gap-2 sm:grid-cols-[1fr_auto_1fr] sm:items-center">
                    <input type="date"
                           x-model="filters.date_from"
                           @change="applyFilters()"
                           class="min-h-11 w-full rounded-lg border border-border bg-surface-alt px-3 py-2 text-sm text-content focus:outline-none focus:ring-2 focus:ring-jckfrt-olive"
                           placeholder="From">
                    <span class="hidden text-center text-sm text-content-secondary sm:block">to</span>
                    <input type="date"
                           x-model="filters.date_to"
                           @change="applyFilters()"
                           class="min-h-11 w-full rounded-lg border border-border bg-surface-alt px-3 py-2 text-sm text-content focus:outline-none focus:ring-2 focus:ring-jckfrt-olive"
                           placeholder="To">
                </div>
            </div>

            <div class="flex items-end">
                <button @click="clearFilters()"
                        x-show="hasActiveFilters()"
                        type="button"
                        class="inline-flex min-h-11 w-full items-center justify-center gap-2 rounded-lg border border-red-200 bg-red-50 px-4 py-2 text-sm font-semibold text-red-700 transition-colors hover:bg-red-100 md:w-auto">
                    <span class="iconify" data-icon="mdi:filter-remove"></span>
                    Clear Filters
                </button>
            </div>
        </div>
    </section>

    <section class="rounded-xl border border-border bg-surface p-3 shadow-sm sm:p-4">
        <div id="simulation-list"
             class="max-h-[36rem] space-y-3 overflow-y-auto pr-1"
             hx-get="{% url 'accounts:simulation-history' %}"
             hx-trigger="load"
             hx-swap="innerHTML"
             @scroll="handleScroll($event)">
            <div class="flex items-center justify-center gap-2 py-10 text-sm text-content-secondary">
                <span class="iconify animate-spin text-lg" data-icon="mdi:loading"></span>
                Loading simulations...
            </div>
        </div>
    </section>
</div>
