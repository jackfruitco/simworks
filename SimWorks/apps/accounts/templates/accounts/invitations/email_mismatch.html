{% extends "base.html" %}

{% block title %}Invitation Email Mismatch - {{ SITE_NAME }}{% endblock %}

{% block content %}
<section class="tw-root mx-auto max-w-xl px-4 py-12">
  <div class="rounded-lg border border-border bg-surface-alt p-6 shadow-lg">
    <h1 class="text-2xl font-bold text-content">Use the invited email</h1>
    <p class="mt-3 text-content-secondary">
      This invitation is for {{ invitation.email }}. Log in with that email address to accept it.
    </p>
    <a href="{% url 'account_login' %}" class="mt-6 inline-flex min-h-11 items-center rounded-lg bg-jckfrt-olive px-4 py-2 text-sm font-semibold text-content-light">
      Log in
    </a>
  </div>
</section>
{% endblock %}
