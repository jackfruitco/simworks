{% extends "base.html" %}

{% block title %}Logged Out - {{ SITE_NAME }}{% endblock %}

{% block content %}
    <div class="max-w-md mx-auto mt-8 bg-surface-alt border border-border rounded-lg shadow-lg p-8">
        <div class="text-center mb-6">
            <svg class="w-16 h-16 mx-auto text-jckfrt-olive mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
            </svg>
            <h1 class="text-3xl font-bold text-content mb-4">Logged Out</h1>
        </div>

        <div class="bg-green-50 border border-green-200 text-green-800 px-4 py-3 rounded mb-6">
            <p>You have been successfully logged out.</p>
        </div>

        <div class="text-center space-y-3">
            <a href="{% url 'account_login' %}"
               class="block w-full bg-jckfrt-olive hover:bg-jckfrt-olive-hover text-content-light font-medium py-2 px-4 rounded transition-colors">
                Log In Again
            </a>
            <a href="{% url 'home' %}"
               class="block w-full bg-surface border border-border hover:bg-surface-alt text-content font-medium py-2 px-4 rounded transition-colors">
                Return to Homepage
            </a>
        </div>
    </div>
{% endblock %}
