{% extends 'base.html' %}

{% block title %}Subscription Started - {{ SITE_NAME }}{% endblock %}

{% block content %}
<div class="tw-root mx-auto w-full max-w-3xl px-4 py-12 sm:px-6 lg:px-8">
  <section class="rounded-lg border border-border bg-surface p-6 shadow-sm">
    <h1 class="text-3xl font-bold text-content">Subscription started</h1>
    <p class="mt-3 text-sm text-content-secondary">
      Stripe is finishing your subscription setup. Access updates after the webhook arrives.
    </p>
    <div class="mt-6 flex flex-wrap gap-3">
      <a class="inline-flex min-h-10 items-center justify-center gap-2 rounded-lg bg-jckfrt-olive px-4 py-2 text-sm font-semibold text-white hover:bg-jckfrt-olive/90" href="{% url 'billing:home' %}">
        <span class="iconify" data-icon="mdi:credit-card-outline"></span>
        Billing
      </a>
      <a class="inline-flex min-h-10 items-center justify-center gap-2 rounded-lg border border-border px-4 py-2 text-sm font-semibold text-content hover:bg-surface-alt" href="{% url 'home' %}">
        <span class="iconify" data-icon="mdi:home-outline"></span>
        Home
      </a>
    </div>
  </section>
</div>
{% endblock content %}
