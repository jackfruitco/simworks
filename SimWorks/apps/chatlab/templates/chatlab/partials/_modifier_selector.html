{% for group in modifier_groups %}
<fieldset class="mb-4 rounded-lg border border-border bg-surface-alt p-3 last:mb-0">
    <legend class="px-1 text-xs font-semibold uppercase tracking-wide text-content-secondary">{{ group.group }}</legend>
    <div class="mt-2 space-y-2">
        {% for mod in group.modifiers %}
        <label class="flex cursor-pointer items-start gap-2 text-sm text-content">
            <input type="checkbox"
                   name="modifier"
                   value="{{ mod.key }}"
                   class="mt-0.5 h-4 w-4 rounded border-border text-jckfrt-olive focus:ring-jckfrt-olive">
            <span>{{ mod.description }}</span>
        </label>
        {% endfor %}
    </div>
</fieldset>
{% empty %}
<p class="text-sm text-content-secondary">No modifiers available.</p>
{% endfor %}
