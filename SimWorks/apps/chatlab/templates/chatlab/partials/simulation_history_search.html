<form id="simulation-search-form"
      hx-get="{% url 'chatlab:index' %}"
      hx-target="#simulation-history-list"
      hx-push-url="true"
      hx-trigger="submit"
      hx-indicator="#search-loading"
      class="rounded-xl border border-border bg-surface p-4 shadow-sm"
      x-data="{ searchQuery: '{{ search_query }}' }">
    <div class="space-y-4">
        <div>
            <label class="mb-2 block text-xs font-semibold uppercase tracking-wide text-content-secondary" for="simulation-search-input">
                Search Simulations
            </label>
            <div class="relative">
                <input id="simulation-search-input"
                       type="text"
                       name="q"
                       placeholder="Search by name, complaint, or patient..."
                       value="{{ search_query }}"
                       autocomplete="off"
                       x-model="searchQuery"
                       class="min-h-11 w-full rounded-lg border border-border bg-surface-alt px-3 py-2 pr-10 text-sm text-content focus:outline-none focus:ring-2 focus:ring-jckfrt-olive">
                <button type="button"
                        x-show="searchQuery.length > 0"
                        @click="searchQuery = ''; $el.closest('form').querySelector('input[name=q]').value = ''"
                        class="absolute right-2 top-1/2 inline-flex h-8 w-8 -translate-y-1/2 items-center justify-center rounded-full text-content-secondary transition-colors hover:bg-surface">
                    <span class="iconify" data-icon="mdi:close-circle"></span>
                </button>
            </div>
        </div>

        <label class="inline-flex min-h-11 cursor-pointer items-center gap-2 rounded-lg border border-border bg-surface-alt px-3 py-2 text-sm text-content">
            <input id="search-messages-checkbox"
                   type="checkbox"
                   name="search_messages"
                   value="1"{% if search_messages %} checked{% endif %}
                   class="h-4 w-4 rounded border-border text-jckfrt-olive focus:ring-jckfrt-olive">
            <span>Include message content in search</span>
        </label>

        <div class="flex justify-end">
            <button class="inline-flex min-h-11 items-center gap-2 rounded-lg bg-jckfrt-olive px-4 py-2 text-sm font-semibold text-content-light transition-colors hover:bg-jckfrt-olive-hover" type="submit">
                <span id="search-loading" class="htmx-indicator" style="display: none;">
                    <span class="iconify animate-spin" data-icon="svg-spinners:blocks-shuffle-3"></span>
                </span>
                <span class="iconify" data-icon="mdi:magnify"></span>
                <span>Search</span>
            </button>
        </div>
    </div>
</form>
