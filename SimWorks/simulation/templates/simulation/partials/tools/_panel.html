{# templates/simulation/partials/tools/_panel.html #}
<div id="{{ tool.name|lower }}-tool-header"
     class="tool-panel-header"
     :class="{'expanded': isOpen('{{ tool.name|lower }}')}"
     @click="toggle('{{ tool.name|lower }}')"
     role="button"
     tabindex="0"
     :aria-controls="'{{ tool.name|lower }}_tool'"
     :aria-expanded="isOpen('{{ tool.name|lower }}') ? 'true' : 'false'"
     @keydown.enter.prevent="toggle('{{ tool.name|lower }}')"
     @keydown.space.prevent="toggle('{{ tool.name|lower }}')">

    <div class="tool-panel-title">
        <div class="tool-panel-icon">
            <span class="iconify"
                  data-icon="{% if tool.name|lower == 'patient_history' %}mdi:history{% elif tool.name|lower == 'patient_results' %}mdi:flask{% elif tool.name|lower == 'simulation_feedback' %}mdi:comment-text{% else %}mdi:information{% endif %}"
                  data-inline="true"></span>
        </div>
        <span>{{ tool.display_name }}</span>

        {# Tool badges #}
        {% if tool.data|length == 0 %}
            <span class="tool-badge tool-badge-empty">Empty</span>
        {% elif tool.is_new %}
            <span class="tool-badge tool-badge-new">New</span>
        {% elif tool.has_updates %}
            <span class="tool-badge tool-badge-updated">Updated</span>
        {% endif %}
    </div>

    <div class="tool-panel-actions">
        {% if tool.name|lower == "simulation_feedback" %}
        <form method="POST"
              action="{% url 'chatlab:run_simulation' simulation.id %}?feedback_continue_conversation=true"
              x-show="
                {{ simulation_locked|default_if_none:False|yesno:'true,false' }}
                && !{{ feedback_continuation|default_if_none:False|yesno:'true,false' }}
              "
              @click.stop>
            {% csrf_token %}
            <button type="submit"
                    class="px-3 py-1.5 text-xs font-semibold text-white bg-blue-600 rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition-all duration-200">
                <span class="iconify mr-1" data-icon="mdi:message-reply" data-inline="true"></span>
                Continue with Stitch
            </button>
        </form>
        {% endif %}

        <button type="button"
                @click.stop="toggle('{{ tool.name|lower }}')"
                class="tool-toggle-btn"
                :aria-controls="'{{ tool.name|lower }}_tool'"
                :aria-expanded="isOpen('{{ tool.name|lower }}') ? 'true' : 'false'">
            <span x-show="!isOpen('{{ tool.name|lower }}')">
                <span class="iconify mr-1" data-icon="mdi:chevron-down" data-inline="true"></span>
                Show
            </span>
            <span x-show="isOpen('{{ tool.name|lower }}')">
                <span class="iconify mr-1" data-icon="mdi:chevron-up" data-inline="true"></span>
                Hide
            </span>
        </button>
    </div>
</div>
