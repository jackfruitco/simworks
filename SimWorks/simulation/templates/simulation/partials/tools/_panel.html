{# templates/simulation/partials/tools/_panel.html #}
<div id="{{ tool.name|lower }}-tool-header"
     class="flex items-center justify-between px-4 py-3 bg-white border-b border-gray-200 cursor-pointer hover:bg-gray-50"
     @click="toggle('{{ tool.name|lower }}')"
     role="button"
     tabindex="0"
     :aria-controls="'{{ tool.name|lower }}_tool'"
     :aria-expanded="isOpen('{{ tool.name|lower }}') ? 'true' : 'false'"
     @keydown.enter.prevent="toggle('{{ tool.name|lower }}')"
     @keydown.space.prevent="toggle('{{ tool.name|lower }}')">
    <h3 class="flex items-center gap-2 text-base font-medium text-gray-900">
        <span class="iconify text-gray-600" data-icon="material-symbols:menu-open-rounded" data-inline="true"></span>
        {{ tool.display_name }}
    </h3>

    <div class="flex items-center gap-2">
        {% if tool.name|lower == "simulation_feedback" %}
        <form method="POST"
              action="{% url 'chatlab:run_simulation' simulation.id %}?feedback_continue_conversation=true"
              x-show="
                {{ simulation_locked|default_if_none:False|yesno:'true,false' }}
                && !{{ feedback_continuation|default_if_none:False|yesno:'true,false' }}
              "
              @click.stop>
            {% csrf_token %}
            <button type="submit" class="px-3 py-1 text-xs font-medium text-white bg-blue-600 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                Continue conversation with Stitch
            </button>
        </form>
        {% endif %}

        <button type="button"
                @click.stop="toggle('{{ tool.name|lower }}')"
                class="px-3 py-1 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500 hidden md:block"
                :aria-controls="'{{ tool.name|lower }}_tool'"
                :aria-expanded="isOpen('{{ tool.name|lower }}') ? 'true' : 'false'"
                x-text="isOpen('{{ tool.name|lower }}') ? 'Hide' : 'Show'">
        </button>
    </div>
</div>
