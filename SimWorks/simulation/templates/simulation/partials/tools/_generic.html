{# templates/simulation/partials/tools/_generic.html #}
{% if tool.data %}
    <div class="tool-item-list">
        {% for metafield in tool.data %}
            <div class="tool-item">
                <span class="tool-item-key">{{ metafield.key|title }}</span>
                <span class="tool-item-value">{{ metafield.value|title }}</span>
            </div>
        {% endfor %}
    </div>
{% else %}
    <div class="tool-empty-state">
        <div class="tool-empty-icon">
            <span class="iconify" data-icon="mdi:information-outline" style="font-size: 4rem;"></span>
        </div>
        <h4 class="tool-empty-title">No data available</h4>
        <p class="tool-empty-description">
            We'll display details here once they're ready.
        </p>
    </div>
{% endif %}
