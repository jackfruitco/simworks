server {
    listen 80;

    client_max_body_size 500m;

     # -----------------------------
     # TrainerLab SSE event streams
     # -----------------------------
     location ~ ^/api/v1/trainerlab/simulations/[0-9]+/events/stream/?$ {
         proxy_pass http://server:8000;
         proxy_http_version 1.1;

         # SSE must stream immediately and remain long-lived.
         proxy_buffering off;
         proxy_request_buffering off;
         proxy_cache off;
         gzip off;

         proxy_set_header Host              $host;
         proxy_set_header X-Forwarded-Host  $host;
         proxy_set_header X-Forwarded-Port  $server_port;
         proxy_set_header X-Forwarded-Proto $scheme;
         proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

         # Keep the upstream stream open during idle periods.
         proxy_read_timeout 3600s;
         proxy_send_timeout 3600s;
         proxy_redirect off;

         # Instruct nginx not to buffer this response.
         add_header X-Accel-Buffering no always;
     }

    # -----------------------------
    # Main app
    # -----------------------------
    location / {
        proxy_pass http://server:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

        proxy_redirect off;
    }

    # -----------------------------
    # WebSockets / Django Channels
    # -----------------------------
    location /ws/ {
        proxy_pass http://server:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_redirect off;
    }

    # -----------------------------
    # Static files
    # -----------------------------
    location /static/ {
        autoindex on;
        alias /app/static/;
    }

    # -----------------------------
    # Media files
    # -----------------------------
    location /media/ {
        autoindex on;
        alias /app/media/;
    }
}
