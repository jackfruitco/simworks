name: cd-release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without leading v (e.g. 0.6.0)"
        required: true
        type: string
      rc:
        description: "RC number (e.g. 1)"
        required: true
        type: string
      trigger_webhook:
        description: "Trigger staging Portainer webhook when configured"
        required: false
        default: true
        type: boolean

env:
  IMAGE: ghcr.io/${{ github.repository }}

concurrency:
  group: cd-release
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

jobs:
  release:
    name: cd-release
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Validate dispatch ref and inputs
        env:
          VERSION: ${{ inputs.version }}
          RC: ${{ inputs.rc }}
        run: |
          set -euo pipefail

          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "cd-release can only run from refs/heads/main. Current ref: ${GITHUB_REF}" >&2
            exit 1
          fi

          if ! [[ "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "version must match X.Y.Z (received: ${VERSION})" >&2
            exit 1
          fi

          if ! [[ "${RC}" =~ ^[0-9]+$ ]]; then
            echo "rc must be numeric (received: ${RC})" >&2
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure RC tag does not already exist
        env:
          RC_TAG: v${{ inputs.version }}-rc${{ inputs.rc }}
        run: |
          set -euo pipefail

          if docker buildx imagetools inspect "${IMAGE}:${RC_TAG}" > /dev/null 2>&1; then
            echo "Refusing to overwrite existing immutable RC tag: ${IMAGE}:${RC_TAG}" >&2
            exit 1
          fi

      - name: Build and push RC image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: docker/Dockerfile.prod
          push: true
          cache-from: type=gha,mode=max,scope=runtime-image
          cache-to: type=gha,mode=max,scope=runtime-image
          tags: |
            ${{ env.IMAGE }}:v${{ inputs.version }}-rc${{ inputs.rc }}
            ${{ env.IMAGE }}:sha-${{ github.sha }}
            ${{ env.IMAGE }}:staging
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=v${{ inputs.version }}-rc${{ inputs.rc }}

      - name: Scan pushed RC image
        uses: aquasecurity/trivy-action@915b19bbe73b92a6cf82a1bc12b087c9a19a5fe2
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE }}:v${{ inputs.version }}-rc${{ inputs.rc }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Generate CycloneDX SBOM
        uses: aquasecurity/trivy-action@915b19bbe73b92a6cf82a1bc12b087c9a19a5fe2
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE }}:v${{ inputs.version }}-rc${{ inputs.rc }}
          format: cyclonedx
          output: sbom.cdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: sbom-cdx
          path: sbom.cdx.json
          if-no-files-found: error
          retention-days: 14

      - name: Attest build provenance
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@f713795cb21599bc4e5c4b58cbad1da852d7eeb9

      - name: Sign image digest with keyless OIDC
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Trigger Portainer staging redeploy
        if: ${{ inputs.trigger_webhook && secrets.PORTAINER_WEBHOOK_STAGING != '' }}
        run: curl -fsSL -X POST "${{ secrets.PORTAINER_WEBHOOK_STAGING }}"
