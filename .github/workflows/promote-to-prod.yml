name: Promote to Prod (retag by digest)

on:
  workflow_dispatch:
    inputs:
      rc_tag:
        description: "RC tag to promote (e.g. v0.4.3-rc1)"
        required: true
        type: string
      final_version:
        description: "Final release version without leading v (e.g. 0.4.3)"
        required: true
        type: string

env:
  IMAGE: ghcr.io/${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Docker Buildx
        # docker/setup-buildx-action@v3
        uses: docker/setup-buildx-action@8d2750c68a3f8d5447b99a9941a78f79d0e77d56

      - name: Log in to GHCR
        # docker/login-action@v3
        uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve RC digest and promote tags
        env:
          RC_TAG: ${{ inputs.rc_tag }}
          FINAL_VERSION: ${{ inputs.final_version }}
        run: |
          set -euo pipefail

          DIGEST="$(
            docker buildx imagetools inspect "$IMAGE:${RC_TAG}" --format '{{json .Manifest}}' 2>/dev/null \
            | jq -r '.digest // empty'
          )"

          if [ -z "${DIGEST}" ]; then
            DIGEST="$(
              docker buildx imagetools inspect "$IMAGE:${RC_TAG}" \
              | awk '/^Digest:[[:space:]]+/ { print $2; exit }'
            )"
          fi

          if ! [[ "${DIGEST}" =~ ^sha256:[a-f0-9]{64}$ ]]; then
            echo "Failed to resolve digest for $IMAGE:${RC_TAG}" >&2
            exit 1
          fi

          echo "Promoting source tag: $IMAGE:${RC_TAG}"
          echo "Resolved digest: ${DIGEST}"
          echo "Destination tags: $IMAGE:v${FINAL_VERSION}, $IMAGE:prod"

          docker buildx imagetools create \
            -t "$IMAGE:v${FINAL_VERSION}" \
            -t "$IMAGE:prod" \
            "$IMAGE@${DIGEST}"

      - name: Trigger Portainer prod redeploy
        if: ${{ secrets.PORTAINER_WEBHOOK_PROD != '' }}
        run: curl -fsSL -X POST "${{ secrets.PORTAINER_WEBHOOK_PROD }}"
