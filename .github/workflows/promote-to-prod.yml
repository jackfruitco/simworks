name: Promote to Prod (retag by digest)

on:
  workflow_dispatch:
    inputs:
      rc_tag:
        description: "RC tag to promote (e.g. v0.4.3-rc1)"
        required: true
        type: string
      final_version:
        description: "Final release version without leading v (e.g. 0.4.3)"
        required: true
        type: string

env:
  IMAGE: ghcr.io/${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve RC digest and promote tags
        env:
          RC_TAG: ${{ inputs.rc_tag }}
          FINAL_VERSION: ${{ inputs.final_version }}
        run: |
          set -euo pipefail

          DIGEST="$(docker buildx imagetools inspect "$IMAGE:${RC_TAG}" | grep -m1 'Digest:' | awk '{print $2}')"

          if [ -z "${DIGEST}" ]; then
            echo "Failed to resolve digest for $IMAGE:${RC_TAG}" >&2
            exit 1
          fi

          echo "Promoting source tag: $IMAGE:${RC_TAG}"
          echo "Resolved digest: ${DIGEST}"
          echo "Destination tags: $IMAGE:v${FINAL_VERSION}, $IMAGE:prod"

          docker buildx imagetools create \
            -t "$IMAGE:v${FINAL_VERSION}" \
            -t "$IMAGE:prod" \
            "$IMAGE@${DIGEST}"

      - name: Trigger Portainer prod redeploy
        if: ${{ secrets.PORTAINER_WEBHOOK_PROD != '' }}
        run: curl -fsSL -X POST "${{ secrets.PORTAINER_WEBHOOK_PROD }}"
