name: Release RC (build + tag staging)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without leading v (e.g. 0.4.3)"
        required: true
        type: string
      rc:
        description: "RC number (e.g. 1)"
        required: true
        type: string

env:
  IMAGE: ghcr.io/${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        # actions/checkout@v4
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Docker Buildx
        # docker/setup-buildx-action@v3
        uses: docker/setup-buildx-action@8d2750c68a3f8d5447b99a9941a78f79d0e77d56

      - name: Log in to GHCR
        # docker/login-action@v3
        uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push RC image
        # docker/build-push-action@v6
        uses: docker/build-push-action@0adf99575913103a6d7eb95d8d280d1b50778f94
        with:
          context: .
          file: docker/Dockerfile.prod
          push: true
          tags: |
            ${{ env.IMAGE }}:v${{ inputs.version }}-rc${{ inputs.rc }}
            ${{ env.IMAGE }}:sha-${{ github.sha }}
            ${{ env.IMAGE }}:staging
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=v${{ inputs.version }}-rc${{ inputs.rc }}

      - name: Trigger Portainer staging redeploy
        if: ${{ secrets.PORTAINER_WEBHOOK_STAGING != '' }}
        run: curl -fsSL -X POST "${{ secrets.PORTAINER_WEBHOOK_STAGING }}"
