name: Release RC (build + tag staging)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without leading v (e.g. 0.4.3)"
        required: true
        type: string
      rc:
        description: "RC number (e.g. 1)"
        required: true
        type: string

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/medsim

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push RC image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.prod
          push: true
          tags: |
            ${{ env.IMAGE }}:v${{ inputs.version }}-rc${{ inputs.rc }}
            ${{ env.IMAGE }}:sha-${{ github.sha }}
            ${{ env.IMAGE }}:staging
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=v${{ inputs.version }}-rc${{ inputs.rc }}

      - name: Trigger Portainer staging redeploy
        if: ${{ secrets.PORTAINER_WEBHOOK_STAGING != '' }}
        run: curl -fsSL -X POST "${{ secrets.PORTAINER_WEBHOOK_STAGING }}"
