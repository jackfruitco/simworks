name: CI

on:
  push:
    branches: ["main"]
    tags: ["v*", "main*"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: config.settings
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tailwind CSS
        run: npm run build:css

      - name: Verify Tailwind CSS is committed
        run: git diff --exit-code -- SimWorks/static/css/tailwind.css

      - name: Lint and format
        run: uv run pre-commit run --all-files

      - name: Run tests with coverage
        run: uv run pytest --cov --cov-report=xml

      - name: Generate coverage summary
        id: coverage-summary
        run: |
          python - <<'PY'
          import os
          import xml.etree.ElementTree as ET

          tree = ET.parse("coverage.xml")
          coverage = float(tree.getroot().get("line-rate", 0)) * 100
          coverage = round(coverage, 2)

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary_path:
            with open(summary_path, "a", encoding="utf-8") as summary:
              summary.write("## Coverage Summary\n\n")
              summary.write(f"- Total coverage: {coverage}%\n")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as outputs:
            outputs.write(f"coverage={coverage}\n")
          PY

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const coverage = process.env.coverage;
            const body = `## CI Coverage\nTotal coverage: ${coverage}%`;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            await github.rest.issues.createComment({ owner, repo, issue_number, body });
        env:
          coverage: ${{ steps.coverage-summary.outputs.coverage }}

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  api-schema:
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: config.settings
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Validate OpenAPI schema is up to date
        working-directory: SimWorks
        run: |
          # Export current schema
          uv run python manage.py export_openapi --output /tmp/current-schema.json

          # Compare with committed schema
          if ! diff -q /tmp/current-schema.json ../docs/openapi/v1.json > /dev/null 2>&1; then
            echo "::error::OpenAPI schema is out of date. Run 'uv run python SimWorks/manage.py export_openapi --output docs/openapi/v1.json' and commit the changes."
            echo ""
            echo "Differences:"
            diff /tmp/current-schema.json ../docs/openapi/v1.json || true
            exit 1
          fi
          echo "✓ OpenAPI schema is up to date"

      - name: Validate OpenAPI schema structure
        run: |
          python - <<'PY'
          import json
          import sys

          with open("docs/openapi/v1.json") as f:
              schema = json.load(f)

          # Basic OpenAPI 3.x validation
          errors = []

          if "openapi" not in schema:
              errors.append("Missing 'openapi' version field")
          elif not schema["openapi"].startswith("3."):
              errors.append(f"Unsupported OpenAPI version: {schema['openapi']}")

          if "info" not in schema:
              errors.append("Missing 'info' field")
          elif "title" not in schema.get("info", {}):
              errors.append("Missing 'info.title' field")

          if "paths" not in schema:
              errors.append("Missing 'paths' field")

          if errors:
              for error in errors:
                  print(f"::error::{error}")
              sys.exit(1)

          print(f"✓ Valid OpenAPI {schema['openapi']} schema")
          print(f"  Title: {schema['info']['title']}")
          print(f"  Version: {schema['info'].get('version', 'N/A')}")
          print(f"  Endpoints: {len(schema['paths'])}")
          PY
