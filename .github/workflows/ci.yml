name: ci

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  prepare:
    name: prepare
    runs-on: ubuntu-latest
    outputs:
      package_contracts: ${{ steps.filter.outputs.package_contracts }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            package_contracts:
              - 'packages/**'
              - 'pyproject.toml'
              - 'uv.lock'

  lint_and_checks:
    name: lint_and_checks
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      DJANGO_SETTINGS_MODULE: config.settings
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.14.3'

      - name: Set up uv
        uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --locked --dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tailwind CSS
        run: npm run build:css

      - name: Verify Tailwind CSS is committed
        run: git diff --exit-code -- SimWorks/static/css/tailwind.css

      - name: Run Django system checks
        run: uv run python SimWorks/manage.py check

      - name: Run lint and formatting checks
        run: uv run pre-commit run --all-files

      - name: Validate OpenAPI schema is up to date
        run: |
          uv run python scripts/export_openapi.py --output /tmp/current-schema.json

          if ! diff -q /tmp/current-schema.json docs/openapi/v1.json > /dev/null 2>&1; then
            echo "::error::OpenAPI schema is out of date. Run 'uv run python scripts/export_openapi.py --output docs/openapi/v1.json' and commit the changes."
            echo ""
            echo "Differences:"
            diff /tmp/current-schema.json docs/openapi/v1.json || true
            exit 1
          fi
          echo "OpenAPI schema is up to date"

      - name: Validate OpenAPI schema structure
        run: |
          python - <<'PY'
          import json
          import sys

          with open("docs/openapi/v1.json", encoding="utf-8") as f:
              schema = json.load(f)

          errors = []

          if "openapi" not in schema:
              errors.append("Missing 'openapi' version field")
          elif not schema["openapi"].startswith("3."):
              errors.append(f"Unsupported OpenAPI version: {schema['openapi']}")

          if "info" not in schema:
              errors.append("Missing 'info' field")
          elif "title" not in schema.get("info", {}):
              errors.append("Missing 'info.title' field")

          if "paths" not in schema:
              errors.append("Missing 'paths' field")

          if errors:
              for error in errors:
                  print(f"::error::{error}")
              sys.exit(1)

          print(f"Valid OpenAPI {schema['openapi']} schema")
          print(f"Title: {schema['info']['title']}")
          print(f"Version: {schema['info'].get('version', 'N/A')}")
          print(f"Endpoints: {len(schema['paths'])}")
          PY

  unit_fast:
    name: unit_fast
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTEST_FAILURE_ARTIFACT_DIR: .pytest-failure-artifacts
      DJANGO_SETTINGS_MODULE: tests.settings_test
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.14.3'

      - name: Set up uv
        uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --locked --dev

      - name: Run unit lane
        run: |
          start=$(date +%s)
          uv run pytest -m "unit and not slow" --ds=tests.settings_test -n auto --dist loadscope --durations=25
          end=$(date +%s)
          echo "## unit_fast" >> "$GITHUB_STEP_SUMMARY"
          echo "- Runtime: $((end-start))s" >> "$GITHUB_STEP_SUMMARY"
          echo "- Command: \\`uv run pytest -m \"unit and not slow\" --ds=tests.settings_test -n auto --dist loadscope --durations=25\\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload unit failure artifacts
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: unit-failure-artifacts
          path: .pytest-failure-artifacts
          if-no-files-found: ignore
          retention-days: 7

  integration_core:
    name: integration_core
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PYTEST_FAILURE_ARTIFACT_DIR: .pytest-failure-artifacts
      DJANGO_SETTINGS_MODULE: tests.settings_test
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.14.3'

      - name: Set up uv
        uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --locked --dev

      - name: Run integration core lane
        run: |
          start=$(date +%s)
          uv run pytest -m "integration and not slow" --ds=tests.settings_test --durations=25
          end=$(date +%s)
          echo "## integration_core" >> "$GITHUB_STEP_SUMMARY"
          echo "- Runtime: $((end-start))s" >> "$GITHUB_STEP_SUMMARY"
          echo "- Command: \\`uv run pytest -m \"integration and not slow\" --ds=tests.settings_test --durations=25\\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload integration failure artifacts
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: integration-failure-artifacts
          path: .pytest-failure-artifacts
          if-no-files-found: ignore
          retention-days: 7

  package_contracts:
    name: package_contracts
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [prepare]
    if: needs.prepare.outputs.package_contracts == 'true' || github.event_name == 'push'
    env:
      PYTEST_FAILURE_ARTIFACT_DIR: .pytest-failure-artifacts
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.14.3'

      - name: Set up uv
        uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --locked --dev

      - name: Run package contracts
        run: |
          start=$(date +%s)
          uv run pytest packages/orchestrai/tests -m "contract and not slow" -n auto --dist loadscope --durations=25
          PYTHONPATH=.:SimWorks:packages/orchestrai/src:packages/orchestrai_django/src \
          uv run pytest packages/orchestrai_django/tests \
            -m "contract and not slow" \
            --ds=orchestrai_django.tests.settings \
            -n auto --dist loadscope --durations=25
          end=$(date +%s)
          echo "## package_contracts" >> "$GITHUB_STEP_SUMMARY"
          echo "- Runtime: $((end-start))s" >> "$GITHUB_STEP_SUMMARY"
          echo "- Command: \`uv run pytest packages/orchestrai/tests -m \"contract and not slow\"\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Command: \`uv run pytest packages/orchestrai_django/tests -m \"contract and not slow\" --ds=orchestrai_django.tests.settings\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload package contract failure artifacts
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: package-contract-failure-artifacts
          path: .pytest-failure-artifacts
          if-no-files-found: ignore
          retention-days: 7

  coverage_gate:
    name: coverage_gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint_and_checks, unit_fast, integration_core]
    env:
      ORCHESTRAI_MIN_COVERAGE: '50'
      ORCHESTRAI_DJANGO_MIN_COVERAGE: '30'
      SIMWORKS_MIN_COVERAGE: '50'
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.14.3'

      - name: Set up uv
        uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --locked --dev

      - name: Generate orchestrai coverage
        run: |
          COVERAGE_FILE=.coverage.orchestrai \
          uv run pytest -q packages/orchestrai/tests -m "not slow" \
            --cov=packages/orchestrai/src/orchestrai \
            --cov-report=xml:coverage-orchestrai.xml \
            --cov-report=term

      - name: Generate orchestrai_django coverage
        run: |
          PYTHONPATH=.:SimWorks:packages/orchestrai/src:packages/orchestrai_django/src \
          COVERAGE_FILE=.coverage.orchestrai_django \
          uv run pytest -q packages/orchestrai_django/tests -m "not slow" \
            --ds=orchestrai_django.tests.settings \
            --cov=packages/orchestrai_django/src/orchestrai_django \
            --cov-report=xml:coverage-orchestrai-django.xml \
            --cov-report=term

      - name: Generate SimWorks coverage
        run: |
          COVERAGE_FILE=.coverage.simworks \
          uv run pytest -q tests -m "not slow" \
            --cov=SimWorks \
            --cov-report=xml:coverage-simworks.xml \
            --cov-report=term

      - name: Enforce coverage floors
        run: |
          python - <<'PY'
          import os
          import sys
          import xml.etree.ElementTree as ET

          floors = {
              "orchestrai": float(os.environ["ORCHESTRAI_MIN_COVERAGE"]),
              "orchestrai_django": float(os.environ["ORCHESTRAI_DJANGO_MIN_COVERAGE"]),
              "simworks": float(os.environ["SIMWORKS_MIN_COVERAGE"]),
          }
          files = {
              "orchestrai": "coverage-orchestrai.xml",
              "orchestrai_django": "coverage-orchestrai-django.xml",
              "simworks": "coverage-simworks.xml",
          }

          observed = {}
          failed = []
          for key, path in files.items():
              tree = ET.parse(path)
              rate = float(tree.getroot().attrib.get("line-rate", 0)) * 100
              observed[key] = round(rate, 2)
              if rate < floors[key]:
                  failed.append(f"{key}: {observed[key]}% < required {floors[key]}%")

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary_path:
              with open(summary_path, "a", encoding="utf-8") as summary:
                  summary.write("## Coverage Gate\\n\\n")
                  for key in ("orchestrai", "orchestrai_django", "simworks"):
                      summary.write(
                          f"- {key}: {observed[key]}% (floor {floors[key]}%)\\n"
                      )

          if failed:
              for line in failed:
                  print(f"::error::{line}")
              sys.exit(1)
          PY

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: package-coverage-xml
          path: |
            coverage-orchestrai.xml
            coverage-orchestrai-django.xml
            coverage-simworks.xml
          if-no-files-found: error
          retention-days: 7

      - name: Upload coverage to Codecov
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de
        with:
          files: coverage-orchestrai.xml,coverage-orchestrai-django.xml,coverage-simworks.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
